<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imageboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0a0a0a;
            color: #ccc;
            font-family: Arial, sans-serif;
        }
        header {
            background: #111;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }
        h1 {
            margin: 0;
            color: #00cc00;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }
        .upload-bar {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        button {
            background: #003300;
            color: #00cc00;
            border: 1px solid #00cc00;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #004400; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .post {
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.2s;
        }
        .post:hover {
            transform: scale(1.03);
        }
        .post img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .post-info {
            padding: 10px;
        }
        .post-info .time {
            font-size: 0.8rem;
            color: #666;
        }
        .post-info .caption {
            margin: 8px 0;
            line-height: 1.4;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            text-align: center;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border: 2px solid #333;
        }
        textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #eee;
            padding: 10px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <header>
        <h1>Imageboard</h1>
        <p>Anonymous • Real-time • Anyone can post</p>
    </header>

    <div class="container">
        <div class="upload-bar">
            <input type="file" id="image-upload" accept="image/*" style="display:none;">
            <button onclick="document.getElementById('image-upload').click()">📤 Upload Image</button>
            <textarea id="caption-input" rows="2" placeholder="Optional caption..."></textarea>
            <button onclick="uploadPost()">POST TO BOARD</button>
        </div>

        <div class="grid" id="image-grid"></div>
    </div>

    <!-- Fullscreen modal -->
    <div class="modal" id="modal">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <img id="modal-image" onclick="closeModal()">
            <div id="modal-caption" style="margin-top:10px; color:#ddd;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAfnvKRoX0vGUUsYNIn2JWdhOTZWJaKEm0",
            authDomain: "chan-discord.firebaseapp.com",
            projectId: "chan-discord",
            storageBucket: "chan-discord.firebasestorage.app",
            messagingSenderId: "1055397657925",
            appId: "1:1055397657925:web:3e4f23e5f5ad5dc72bd22c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        firebase.auth().signInAnonymously();

        const grid = document.getElementById('image-grid');
        let selectedFile = null;

        // Handle file selection
        document.getElementById('image-upload').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                // Optional: show preview in upload bar
            }
        });

        async function uploadPost() {
            const caption = document.getElementById('caption-input').value.trim();
            if (!selectedFile) {
                alert("Please select an image");
                return;
            }

            const uploadBtn = document.querySelector('.upload-bar button:last-child');
            const originalText = uploadBtn.textContent;
            uploadBtn.textContent = "Uploading...";
            uploadBtn.disabled = true;

            try {
                // Upload image to Firebase Storage
                const storageRef = storage.ref('images/' + Date.now() + '_' + selectedFile.name);
                await storageRef.put(selectedFile);
                const imageUrl = await storageRef.getDownloadURL();

                // Save metadata to Firestore
                await db.collection("posts").add({
                    imageUrl: imageUrl,
                    caption: caption || null,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    filename: selectedFile.name
                });

                // Clear form
                document.getElementById('caption-input').value = '';
                selectedFile = null;
                document.getElementById('image-upload').value = '';

            } catch (error) {
                console.error(error);
                alert("Upload failed. Check console.");
            } finally {
                uploadBtn.textContent = originalText;
                uploadBtn.disabled = false;
            }
        }

        // Real-time listener
        function loadPosts() {
            db.collection("posts")
                .orderBy("timestamp", "desc")
                .onSnapshot(snapshot => {
                    grid.innerHTML = "";
                    snapshot.forEach(doc => {
                        const p = doc.data();
                        const div = document.createElement('div');
                        div.className = 'post';
                        div.innerHTML = `
                            <img src="${p.imageUrl}" alt="post" onclick="showImage('${p.imageUrl}', '${(p.caption || '').replace(/'/g, "\\'")}')">
                            <div class="post-info">
                                <div class="time">Anonymous • ${p.timestamp ? new Date(p.timestamp.seconds*1000).toLocaleString() : 'Just now'}</div>
                                ${p.caption ? `<div class="caption">${p.caption}</div>` : ''}
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                });
        }

        window.showImage = function(url, caption) {
            document.getElementById('modal-image').src = url;
            document.getElementById('modal-caption').textContent = caption || '';
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeModal = function() {
            document.getElementById('modal').style.display = 'none';
        };

        // Close modal when clicking outside image
        document.getElementById('modal').addEventListener('click', closeModal);

        // Initialize
        loadPosts();
    </script>
</body>
</html>
