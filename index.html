<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imageboard</title>
    <style>
        * { box-sizing: border-box; }
        body { margin:0; background:#0a0a0a; color:#ccc; font-family:Arial, sans-serif; }
        header { background:#111; padding:15px; text-align:center; border-bottom:2px solid #333; }
        h1 { margin:0; color:#00cc00; }
        .container { max-width:1400px; margin:0 auto; padding:15px; }
        .upload-bar { 
            background:#111; padding:15px; border-radius:8px; margin-bottom:20px; 
            display:flex; flex-wrap:wrap; gap:10px; align-items:center; 
        }
        button { 
            background:#003300; color:#00cc00; border:1px solid #00cc00; 
            padding:10px 18px; cursor:pointer; font-weight:bold; 
        }
        button:hover { background:#004400; }
        .preview { max-height:200px; margin:8px 0; border:2px solid #444; }
        .grid { 
            display:grid; 
            grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); 
            gap:15px; 
        }
        .post { 
            background:#111; border-radius:6px; overflow:hidden; 
            border:1px solid #222; 
        }
        .post img { width:100%; height:280px; object-fit:cover; cursor:pointer; }
    </style>
</head>
<body>
    <header><h1>Imageboard</h1></header>
    <div class="container">
        <div class="upload-bar">
            <input type="file" id="image-upload" accept="image/*">
            <textarea id="caption-input" rows="2" placeholder="Optional caption..."></textarea>
            <button onclick="uploadPost()">POST TO BOARD</button>
        </div>
        
        <div id="preview-container"></div>
        <div class="grid" id="image-grid"></div>
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('imageboard_posts') || '[]');

        function renderPosts() {
            const grid = document.getElementById('image-grid');
            grid.innerHTML = '';
            posts.forEach(p => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <img src="${p.image}" onclick="showImage('${p.image}', '${(p.caption || '').replace(/'/g, "\\'")}')">
                    <div style="padding:10px;">
                        <div style="color:#666; font-size:0.8rem;">Anonymous</div>
                        ${p.caption ? `<div style="margin-top:6px;">${p.caption}</div>` : ''}
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function uploadPost() {
            const fileInput = document.getElementById('image-upload');
            const caption = document.getElementById('caption-input').value.trim();
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select an image first!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                posts.unshift({ image: e.target.result, caption: caption });
                localStorage.setItem('imageboard_posts', JSON.stringify(posts));
                renderPosts();
                
                // Clear
                fileInput.value = '';
                document.getElementById('caption-input').value = '';
                document.getElementById('preview-container').innerHTML = '';
            };
            reader.readAsDataURL(file);
        }

        // Live preview when selecting image
        document.getElementById('image-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('preview-container').innerHTML = 
                        `<img src="${ev.target.result}" class="preview">`;
                };
                reader.readAsDataURL(file);
            }
        });

        function showImage(url, caption) {
            const modal = document.createElement('div');
            modal.style = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);
                           display:flex;align-items:center;justify-content:center;z-index:1000;`;
            modal.innerHTML = `
                <img src="${url}" style="max-width:90%;max-height:90vh;" onclick="this.parentElement.remove()">
                ${caption ? `<div style="position:absolute;bottom:30px;color:white;padding:10px;background:rgba(0,0,0,0.7);">${caption}</div>` : ''}
            `;
            document.body.appendChild(modal);
        }

        // Initialize
        renderPosts();
    </script>
</body>
</html>
