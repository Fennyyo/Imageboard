<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4chan Discord</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    
    <style>
        body { margin:0; height:100vh; background:#0a0a0a; color:#b0b0b0; font-family:Arial, sans-serif; overflow:hidden; }
        .screen { display:grid; grid-template-columns:190px 230px 1fr; height:100vh; }
        .sidebar, .channels, .chat { overflow-y:auto; padding:10px; }
        .sidebar { background:#111; border-right:1px solid #222; }
        .channels { background:#1a1a1a; border-right:1px solid #222; }
        .chat { background:#0a0a0a; display:flex; flex-direction:column; }
        
        .header { color:#00cc00; font-weight:bold; margin-bottom:12px; padding:4px 8px; }
        .server, .channel { padding:6px 10px; margin-bottom:3px; cursor:pointer; border-radius:3px; }
        .server.active, .channel.active { background:#003300; color:#00cc00; }
        
        .post { margin-bottom:14px; padding:6px 10px; border-left:3px solid #00cc00; background:#111; }
        .post-header { font-size:0.85rem; color:#00cc00; }
        .username { font-weight:bold; }
        .timestamp { color:#555; margin-left:8px; }
        .message-text { margin-top:4px; color:#ddd; }
        
        .input-area { padding:12px; background:#111; border-top:1px solid #222; }
        textarea { width:100%; background:#1a1a1a; border:1px solid #444; color:#ddd; padding:10px; resize:none; height:80px; }
        button { background:#003300; color:#00cc00; border:1px solid #00cc00; padding:8px 14px; margin:4px 2px; cursor:pointer; }
        
        img { max-width:100%; margin:8px 0; border:1px solid #333; }
    </style>
</head>
<body>
    <div class="screen">
        <aside class="sidebar">
            <div class="header">4CHAN × DISCORD</div>
            <div class="server active">General</div>
        </aside>
        
        <aside class="channels">
            <div class="header">Channels</div>
            <div class="channel active" data-channel="welcome"># welcome</div>
            <div class="channel" data-channel="off-topic"># off-topic</div>
            <div class="channel" data-channel="memes"># memes</div>
        </aside>
        
        <main class="chat">
            <div class="header" id="current-channel"># welcome</div>
            <div id="messages" style="flex:1; padding:12px; overflow-y:auto;"></div>
            
            <div class="input-area">
                <textarea id="message-input" placeholder="Write your post... (Anonymous by default)"></textarea>
                <input type="file" id="image-upload" accept="image/*" style="display:none;">
                <button onclick="document.getElementById('image-upload').click()">Attach Image</button>
                <button onclick="sendPost()">Post</button>
                <div id="preview"></div>
            </div>
        </main>
    </div>

    <script>
        // === PASTE YOUR FIREBASE CONFIG HERE ===
       // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAfnvKRoX0vGUUsYNIn2JWdhOTZWJaKEm0",
  authDomain: "chan-discord.firebaseapp.com",
  databaseURL: "https://chan-discord-default-rtdb.firebaseio.com",
  projectId: "chan-discord",
  storageBucket: "chan-discord.firebasestorage.app",
  messagingSenderId: "1055397657925",
  appId: "1:1055397657925:web:3e4f23e5f5ad5dc72bd22c"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        let currentChannel = "welcome";
        let currentImageFile = null;

        // Anonymous Auth
        firebase.auth().signInAnonymously().catch(console.error);

        // Load messages
        function loadMessages() {
            const messagesDiv = document.getElementById('messages');
            db.collection("channels").doc(currentChannel).collection("messages")
                .orderBy("timestamp", "asc")
                .onSnapshot(snapshot => {
                    messagesDiv.innerHTML = "";
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const post = document.createElement('div');
                        post.className = "post";
                        post.innerHTML = `
                            <div class="post-header">
                                <span class="username">${msg.username || "Anonymous"}</span>
                                <span class="timestamp">${new Date(msg.timestamp?.seconds*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                            ${msg.text ? `<div class="message-text">${msg.text}</div>` : ''}
                            ${msg.imageUrl ? `<img src="${msg.imageUrl}" alt="post image">` : ''}
                        `;
                        messagesDiv.appendChild(post);
                    });
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });
        }

        // Send Post
        window.sendPost = async function() {
            const text = document.getElementById('message-input').value.trim();
            if (!text && !currentImageFile) return;

            let imageUrl = null;
            
            if (currentImageFile) {
                const ref = storage.ref('images/' + Date.now() + '_' + currentImageFile.name);
                await ref.put(currentImageFile);
                imageUrl = await ref.getDownloadURL();
            }

            await db.collection("channels").doc(currentChannel).collection("messages").add({
                username: "Anonymous",
                text: text,
                imageUrl: imageUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('message-input').value = '';
            currentImageFile = null;
            document.getElementById('preview').innerHTML = '';
        };

        // Image Preview
        document.getElementById('image-upload').addEventListener('change', e => {
            currentImageFile = e.target.files[0];
            if (currentImageFile) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('preview').innerHTML = `<img src="${ev.target.result}" style="max-height:150px;">`;
                };
                reader.readAsDataURL(currentImageFile);
            }
        });

        // Channel switching
        document.querySelectorAll('.channel').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                currentChannel = el.dataset.channel;
                document.getElementById('current-channel').textContent = el.textContent;
                loadMessages();
            });
        });

        // Initial load
        loadMessages();
    </script>
</body>
</html>
