<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imageboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin:0; background:#0a0a0a; color:#ccc; font-family:Arial, sans-serif; }
        header { background:#111; padding:15px; text-align:center; border-bottom:2px solid #333; }
        h1 { margin:0; color:#00cc00; }
        .container { max-width:1400px; margin:0 auto; padding:15px; }
        .upload-bar {
            background:#111; padding:15px; border-radius:8px; margin-bottom:20px;
            display:flex; flex-wrap:wrap; gap:10px; align-items:center;
        }
        button {
            background:#003300; color:#00cc00; border:1px solid #00cc00;
            padding:10px 18px; cursor:pointer; font-weight:bold;
        }
        .preview { max-height:180px; max-width:100%; margin:8px 0; border:1px solid #444; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:15px; }
        .post { background:#111; border-radius:6px; overflow:hidden; border:1px solid #222; }
        .post img { width:100%; height:280px; object-fit:cover; cursor:pointer; }
        .post-info { padding:10px; }
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.95); align-items:center; justify-content:center; z-index:1000;
        }
        .debug { background:#330000; padding:10px; margin:10px 0; font-size:0.85rem; white-space:pre-wrap; }
    </style>
</head>
<body>
    <header><h1>Imageboard</h1></header>

    <div class="container">
        <div class="upload-bar">
            <input type="file" id="image-upload" accept="image/*" style="display:none;">
            <button onclick="document.getElementById('image-upload').click()">📤 Choose Image</button>
            
            <div style="flex:1;">
                <textarea id="caption-input" rows="2" placeholder="Optional caption..."></textarea>
                <div id="preview-container"></div>
            </div>
            
            <button onclick="uploadPost()">POST TO BOARD</button>
        </div>

        <div id="debug" class="debug" style="display:none;"></div>

        <div class="grid" id="image-grid"></div>
    </div>

    <div class="modal" id="modal" onclick="closeModal()">
        <div onclick="event.stopImmediatePropagation()">
            <img id="modal-image" style="max-width:90%; max-height:85vh;">
            <div id="modal-caption" style="margin-top:10px; color:#ddd; text-align:center;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* your config */ 
            apiKey: "AIzaSyAfnvKRoX0vGUUsYNIn2JWdhOTZWJaKEm0",
            authDomain: "chan-discord.firebaseapp.com",
            projectId: "chan-discord",
            storageBucket: "chan-discord.firebasestorage.app",
            messagingSenderId: "1055397657925",
            appId: "1:1055397657925:web:3e4f23e5f5ad5dc72bd22c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let selectedFile = null;

        // Preview when selecting file
        document.getElementById('image-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            selectedFile = file;
            const previewContainer = document.getElementById('preview-container');
            previewContainer.innerHTML = `<img src="${URL.createObjectURL(file)}" class="preview">`;
        });

        async function uploadPost() {
            const caption = document.getElementById('caption-input').value.trim();
            const debugEl = document.getElementById('debug');
            debugEl.style.display = 'block';

            if (!selectedFile) {
                debugEl.textContent = "❌ No image selected!";
                return;
            }

            debugEl.textContent = "Signing in anonymously...\n";

            try {
                // Ensure we are signed in
                await firebase.auth().signInAnonymously();
                debugEl.textContent += "✅ Anonymous auth successful\nUploading image...\n";

                const storageRef = storage.ref('images/' + Date.now() + '_' + selectedFile.name);
                const snapshot = await storageRef.put(selectedFile);
                
                debugEl.textContent += "✅ Image uploaded\nGetting URL...\n";
                
                const imageUrl = await snapshot.ref.getDownloadURL();

                debugEl.textContent += "✅ Got URL, saving post...\n";

                await db.collection("posts").add({
                    imageUrl: imageUrl,
                    caption: caption || null,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                debugEl.textContent += "✅ POST SUCCESSFUL!";
                
                // Clear form
                selectedFile = null;
                document.getElementById('image-upload').value = '';
                document.getElementById('caption-input').value = '';
                document.getElementById('preview-container').innerHTML = '';

                setTimeout(() => debugEl.style.display = 'none', 4000);

            } catch (error) {
                console.error(error);
                debugEl.textContent += `❌ ERROR: ${error.message}\nCode: ${error.code || 'unknown'}`;
            }
        }

        function loadPosts() {
            db.collection("posts")
                .orderBy("timestamp", "desc")
                .onSnapshot(snapshot => {
                    const grid = document.getElementById('image-grid');
                    grid.innerHTML = "";
                    snapshot.forEach(doc => {
                        const p = doc.data();
                        const div = document.createElement('div');
                        div.className = 'post';
                        div.innerHTML = `
                            <img src="${p.imageUrl}" onclick="showImage('${p.imageUrl}', '${(p.caption || '').replace(/'/g, "\\'")}')">
                            <div class="post-info">
                                <div style="color:#666; font-size:0.8rem;">
                                    Anonymous • ${p.timestamp ? new Date(p.timestamp.seconds*1000).toLocaleString() : ''}
                                </div>
                                ${p.caption ? `<div style="margin-top:8px;">${p.caption}</div>` : ''}
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                });
        }

        window.showImage = (url, caption) => {
            document.getElementById('modal-image').src = url;
            document.getElementById('modal-caption').textContent = caption || '';
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('modal').style.display = 'none';
        };

        // Start
        firebase.auth().signInAnonymously().catch(console.error);
        loadPosts();
    </script>
</body>
</html>
